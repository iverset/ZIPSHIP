kind = "web"
previewPath = "/"
title = "GitPush"
version = "1.0.0"
id = "artifacts/gitpush"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24587

[services.development]
run = "pnpm --filter @workspace/gitpush run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gitpush", "run", "build" ]
publicDir = "artifacts/gitpush/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24587"
BASE_PATH = "/"
